# Docs at: https://sw.kovidgoyal.net/kitty/conf/

# =============================================================================
# Window settings
# =============================================================================
background_opacity 0.98
window_padding_width 0

# =============================================================================
# Font settings
# =============================================================================
# you need nerd-fonts - https://github.com/ryanoasis/nerd-fonts
font_family {{FONT_FAMILY}}
bold_font {{FONT_FAMILY}}
italic_font {{FONT_FAMILY}}
bold_italic_font {{FONT_FAMILY}}

font_size {{FONT_SIZE}}

# Enable font ligatures (programming symbols like != -> => etc.)
disable_ligatures never

# =============================================================================
# Scrollback
# =============================================================================
scrollback_lines 10000
scrollback_pager_history_size 100

# Use nvim as scrollback pager (ctrl+shift+h to view)
scrollback_pager nvim -c 'setlocal nonumber norelativenumber nolist showtabline=0 foldcolumn=0 buftype=nofile' -c 'nnoremap q :q!<CR>' -

# =============================================================================
# URL and hints
# =============================================================================
detect_urls yes
open_url_with default
url_style curly

# Hints - select URLs, paths, words with keyboard
# ctrl+shift+e - open URLs
# ctrl+shift+p>f - select file paths
# ctrl+shift+p>l - select lines
# ctrl+shift+p>w - select words
map ctrl+shift+e open_url_with_hints
map ctrl+shift+p>f kitten hints --type path --program -
map ctrl+shift+p>l kitten hints --type line --program -
map ctrl+shift+p>w kitten hints --type word --program -
map ctrl+shift+p>h kitten hints --type hash --program -

# =============================================================================
# Clipboard
# =============================================================================
copy_on_select clipboard
strip_trailing_spaces smart

# =============================================================================
# Bell
# =============================================================================
enable_audio_bell no
visual_bell_duration 0.0

# =============================================================================
# Mouse
# =============================================================================
mouse_hide_wait 3.0
click_interval 0.5

# =============================================================================
# Performance
# =============================================================================
repaint_delay 10
input_delay 3
sync_to_monitor yes

# =============================================================================
# Shell integration
# =============================================================================
shell_integration enabled

# =============================================================================
# SSH kitten (for kitty +kitten ssh)
# =============================================================================
# Automatically copies terminfo, enables clipboard sharing
# Usage: kitty +kitten ssh user@host

# =============================================================================
# Color scheme
# =============================================================================
# Default colors
background #262626
foreground #e4e4e4

# Normal colors
color0  #262626
color1  #ff875f
color2  #aeff87
color3  #f08e48
color4  #1c8db2
color5  #c694ff
color6  #00cccc
color7  #77929e

# Bright colors
color8  #517f8d
color9  #ff5a67
color10 #9cf087
color11 #ffcc1b
color12 #7eb2dd
color13 #fb94ff
color14 #00ffff
color15 #b7cff9

# Cursor
cursor #ffcc1b
cursor_text_color #002635

# Selection
selection_foreground #002635
selection_background #ffcc1b

